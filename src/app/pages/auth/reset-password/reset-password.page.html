<ion-content class="reset-page" [fullscreen]="true">

  <div class="container">

    <!-- Bagian Atas: Brand & Judul -->
    <div class="brand">
      <img
        src="./../../../../assets/images/logo.png"
        alt="TokoGenz"
      >
      <h2>Buat Password Baru</h2>
      <p>
        Masukkan password baru yang aman untuk akun Anda.
      </p>
    </div>

    <!-- Bagian Form -->
    <form [formGroup]="resetForm" (ngSubmit)="resetPassword()">

      <!-- Input Password Baru -->
      <div class="input-group">
        <label>Password Baru</label>
        <div class="input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Minimal 6 karakter"
          >
          <button type="button" class="toggle-btn" (click)="showPassword = !showPassword">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Input Konfirmasi Password -->
      <div class="input-group">
        <label>Konfirmasi Password</label>
        <div class="input-wrapper">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="password_confirmation"
            placeholder="Ulangi password baru"
          >
          <button type="button" class="toggle-btn" (click)="showConfirmPassword = !showConfirmPassword">
            <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Pesan Error -->
      <div class="error-msg" *ngIf="resetForm.hasError('mismatch')">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>Password tidak sama</span>
      </div>

      <!-- Tombol Submit -->
      <button
        type="submit"
        class="btn-primary"
        [disabled]="resetForm.invalid || loading">
        {{ loading ? 'Menyimpan...' : 'Simpan Password Baru' }}
      </button>

    </form>

  </div>

</ion-content>
